spring:
  application:
    name: backend-spring-boot
  config:
    import: optional:file:.env[.properties]
  profiles:
    active: local
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081
  address: 0.0.0.0

app:
  jwt:
    issuer: kaknnea-pos
    secret: ${JWT_SECRET:ChangeThisSecretInProd_32bytesminimum}
    access-token-minutes: 720
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost,http://localhost:3000,http://127.0.0.1:3000}
