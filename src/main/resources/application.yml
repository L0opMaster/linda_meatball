spring:
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/kaknnea?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:mypassword}
  jpa:
    hibernate:
      ddl-auto: none
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    locations: classpath:db/migration
  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8081
  address: 0.0.0.0
app:
  jwt:
    issuer: kaknnea-pos
    secret: ${JWT_SECRET:ChangeThisSecretInProd_32bytesminimum}
    access-token-minutes: 720
  cors:
    allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:4200,http://localhost,http://localhost:3000,http://127.0.0.1:3000}

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger

management:
  endpoints:
    web:
      exposure:
        include: health,info
